    /* Login entry screen */
    #loginEntry {

      background: peachpuff;
      display: flex;

      justify-content: center;
      align-items: center;
      z-index: 9999;
    }
    #loginEntry h2 { font-size: 2em; margin: 10px; }
    #loginEntry input {

    #continueBtn {

      transition: 0.3s;
    }
    #continueBtn:hover {

      transform: scale(1.1);
    }

    /* Falling flowers */
    .flower {
      position: fixed;
      top: -60px;
      width: 50px;
      animation: fall 3s linear forwards;
    }
    @keyframes fall {
      to { transform: translateY(100vh); opacity: 0; }
