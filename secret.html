<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Secret Message</title>
  <style>
    body {
      background: #fff0f5;
      font-family: 'Dancing Script', cursive;
      text-align: center;
      padding: 50px;
    }
    h2 {
      color: #d6336c;
    }
    .heart-button {
      background-color: #ff4d6d;
      color: white;
      border: none;
      padding: 15px 30px;
      font-size: 20px;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 0 10px rgba(255, 77, 109, 0.6);
    }
    .heart-button:hover {
      background-color: #ff1a4d;
      box-shadow: 0 0 20px rgba(255, 77, 109, 1);
      transform: scale(1.1);
    }
    #secretVideo {
      display: none;
      margin-top: 20px;
    }
    video {
      border: 3px solid #ff6699;
      border-radius: 10px;
    }
    .decor {
      position: absolute;
      width: 50px;
    }
    .top-left { top: 10px; left: 10px; }
    .top-right { top: 10px; right: 10px; }
    .bottom-left { bottom: 10px; left: 10px; }
    .bottom-right { bottom: 10px; right: 10px; }
  </style>
</head>
<body>
  <h2>Secret Message</h2>

  <!-- Decorative icons -->
  <img src="tulip.png" class="decor top-left">
  <img src="rose.png" class="decor top-right">
  <img src="donut.png" class="decor bottom-left">
  <img src="rose.png" class="decor bottom-right">

  <!-- Heart button -->
  <button class="heart-button" onclick="document.getElementById('secretVideo').style.display='block'">
    ❤️ Click here for your surprise ❤️
  </button>

  <!-- Hidden video -->
  <div id="secretVideo">
    <video controls width="600">
      <source src="anniversary.mp4" type="video/mp4">
      Your browser does not support the video tag.
    </video>
  </div>
</body>
</html>
