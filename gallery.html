<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Gallery</title>
  <style>
    body {
      background: #fdf6f0;
      text-align: center;
      font-family: Arial, sans-serif;
    }
    h2 {
      color: #cc3366;
      margin-top: 20px;
    }
    .slideshow-container {
      position: relative;
      max-width: 800px;
      margin: auto;
    }
    .slides {
      display: none;
    }
    img {
      width: 100%;
      border-radius: 10px;
    }
    .prev, .next {
      cursor: pointer;
      position: absolute;
      top: 50%;
      padding: 16px;
      color: white;
      font-weight: bold;
      font-size: 20px;
      transition: 0.3s;
      user-select: none;
    }
    .next { right: 0; }
    .prev:hover, .next:hover {
      background-color: rgba(0,0,0,0.5);
    }
    audio {
      margin-top: 20px;
    }
    .decor {
      position: absolute;
      width: 50px;
    }
    .top-left { top: 10px; left: 10px; }
    .top-right { top: 10px; right: 10px; }
    .bottom-left { bottom: 10px; left: 10px; }
    .bottom-right { bottom: 10px; right: 10px; }
    nav {
      background-color: #ff4d6d;
      padding: 15px;
      text-align: center;
      border-radius: 30px;
      margin: 20px auto;
      width: 80%;
      box-shadow: 0 0 15px rgba(255, 77, 109, 0.6);
    }
    nav a {
      color: white;
      text-decoration: none;
      margin: 0 20px;
      font-size: 1.2em;
      font-weight: bold;
      transition: all 0.3s ease;
    }
    nav a:hover {
      color: #ffe6f2;
      text-shadow: 0 0 10px #fff;
    }
  </style>
</head>
<body>
  <h2>Our Memories</h2>

  <!-- Navigation bar -->
  <nav>
    <a href="index.html">Home</a>
    <a href="ourstory.html">Our Story</a>
    <a href="timeline.html">Timeline</a>
    <a href="lovenotes.html">Love Notes</a>
    <a href="gallery.html">Gallery</a>
    <a href="secret.html">Secret Message</a>
  </nav>

  <!-- Decorative icons -->
  <img src="tulip.png" class="decor top-left">
  <img src="rose.png" class="decor top-right">
  <img src="donut.png" class="decor bottom-left">
  <img src="rose.png" class="decor bottom-right">

  <div class="slideshow-container">

    <!-- Navigation arrows -->
    <a class="prev" onclick="plusSlides(-1)">❮</a>

  </div>

  <!-- Background music -->
  <audio controls autoplay loop>
    <source src="your-song.mp3" type="audio/mp3">
    Your browser does not support the audio element.
  </audio>

  <script>
    let slideIndex = 1;
    showSlides(slideIndex);

    function plusSlides(n) {
      showSlides(slideIndex += n);
    }

    function showSlides(n) {
      let i;
      let slides = document.getElementsByClassName("slides");
      if (n > slides.length) {slideIndex = 1}
      if (n < 1) {slideIndex = slides.length}
      for (i = 0; i < slides.length; i++) {
        slides[i].style.display = "none";
      }
      slides[slideIndex-1].style.display = "block";
    }

    // Auto-play slideshow
    setInterval(function(){
      plusSlides(1);
    }, 4000); // Change every 4 seconds
  </script>
</body>
</html>
